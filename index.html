<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Test</title>
<script src="https://telegram.org/js/telegram-web-app.js"></script>
<style>
body{margin:0;padding:40px 20px;background:#0a0a0a;color:#fff;font-family:sans-serif;display:flex;flex-direction:column;align-items:center;gap:20px}
button{width:100%;max-width:300px;padding:18px;font-size:18px;font-weight:700;border:none;border-radius:12px;cursor:pointer}
#btn-stars{background:#f5a623;color:#000}
#btn-crypto{background:#3b82f6;color:#fff}
</style>
</head>
<body>
<h2>Тест оплаты</h2>
<button id="btn-stars" onclick="pay('stars')">⭐ Купить за 1 Star</button>
<button id="btn-crypto" onclick="pay('crypto')">💎 Купить за 1 USDT</button>
<script>
const tg = window.Telegram.WebApp;
tg.ready();
tg.expand();

function pay(method){
  tg.close();
  tg.openTelegramLink('https://t.me/test_shop2134_bot?start=' + method + '_small');
}
</script>
</body>
</html>
