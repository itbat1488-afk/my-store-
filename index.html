<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>Exclusive Store</title>
<script src="https://telegram.org/js/telegram-web-app.js"></script>
<style>
:root{--bg:#0a0a0a;--bg2:#141414;--surface:#1e1e1e;--surface2:#262626;--border:rgba(255,255,255,0.08);--text:#fff;--text2:#a0a0a0;--text3:#555;--accent:#f5a623;--accent2:#e09400;--green:#30d158;--r:16px;--rs:10px}
*{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent}
html,body{background:var(--bg);color:var(--text);font-family:-apple-system,BlinkMacSystemFont,sans-serif;min-height:100vh;overscroll-behavior:none}
::-webkit-scrollbar{display:none}
.header{position:sticky;top:0;z-index:100;background:rgba(10,10,10,0.95);backdrop-filter:blur(20px);-webkit-backdrop-filter:blur(20px);border-bottom:1px solid var(--border);padding:14px 16px 10px}
.header-title{font-size:20px;font-weight:700}
.header-sub{font-size:12px;color:var(--text3);margin-top:2px}
.grid{display:grid;grid-template-columns:repeat(2,1fr);gap:10px;padding:12px}
.card{background:var(--surface);border-radius:var(--r);padding:16px 14px 12px;display:flex;flex-direction:column;gap:10px;border:1px solid var(--border);position:relative;transition:transform .15s}
.card:active{transform:scale(0.97)}
.card-header{display:flex;align-items:flex-start;gap:10px}
.card-emoji{font-size:28px;line-height:1;flex-shrink:0}
.card-info{flex:1;min-width:0}
.card-name{font-size:14px;font-weight:700;line-height:1.3}
.card-from{font-size:11px;color:var(--text3);margin-top:3px}
.new-badge{position:absolute;top:10px;right:10px;background:var(--green);color:#000;font-size:9px;font-weight:800;padding:2px 7px;border-radius:6px;text-transform:uppercase}
.add-btn{background:var(--accent);color:#000;border:none;border-radius:8px;width:100%;padding:8px 0;font-size:13px;font-weight:700;cursor:pointer;transition:background .1s}
.add-btn:active{background:var(--accent2)}
.loader{display:flex;justify-content:center;align-items:center;height:200px}
.spinner{width:36px;height:36px;border:3px solid var(--border);border-top-color:var(--accent);border-radius:50%;animation:spin .8s linear infinite}
@keyframes spin{to{transform:rotate(360deg)}}
.overlay{position:fixed;inset:0;background:rgba(0,0,0,0.75);z-index:300;opacity:0;pointer-events:none;transition:opacity .25s}
.overlay.open{opacity:1;pointer-events:all}
.sheet{position:fixed;bottom:0;left:0;right:0;z-index:301;background:var(--bg2);border-radius:24px 24px 0 0;padding:0 0 44px;transform:translateY(100%);transition:transform .35s cubic-bezier(0.32,0.72,0,1);max-height:90vh;overflow-y:auto}
.sheet.open{transform:translateY(0)}
.sheet-handle{width:36px;height:4px;background:rgba(255,255,255,0.18);border-radius:2px;margin:12px auto 0}
.prod-info{padding:20px 20px 0}
.prod-title{font-size:22px;font-weight:800;margin-bottom:6px}
.prod-desc{font-size:14px;color:var(--text2);line-height:1.6}
.sec-label{font-size:11px;font-weight:700;color:var(--text3);text-transform:uppercase;letter-spacing:1px;padding:20px 20px 10px}
.size-list{display:flex;flex-direction:column;gap:8px;padding:0 20px}
.size-row{background:var(--surface);border:2px solid var(--border);border-radius:var(--rs);padding:14px 16px;display:flex;align-items:center;gap:12px;cursor:pointer;transition:all .2s}
.size-row.active{border-color:var(--accent);background:rgba(245,166,35,0.06)}
.size-row:active{transform:scale(0.99)}
.size-badge{width:36px;height:36px;border-radius:8px;background:var(--surface2);display:flex;align-items:center;justify-content:center;font-size:16px;font-weight:800;color:var(--text);flex-shrink:0}
.size-row.active .size-badge{background:var(--accent);color:#000}
.size-text{flex:1}
.size-name{font-size:14px;font-weight:600}
.size-desc{font-size:12px;color:var(--text3);margin-top:2px}
.size-prices{display:flex;gap:10px;align-items:center}
.size-price{font-size:13px;font-weight:700;color:var(--text2)}
.size-row.active .size-price{color:var(--accent)}
.pay-methods{display:flex;flex-direction:column;gap:8px;padding:0 20px}
.pay-row{background:var(--surface);border:2px solid var(--border);border-radius:var(--rs);padding:14px 16px;display:flex;align-items:center;gap:12px;cursor:pointer;transition:all .2s}
.pay-row.active{border-color:var(--accent);background:rgba(245,166,35,0.06)}
.pay-row.dim{opacity:0.38;cursor:not-allowed}
.pay-row:active:not(.dim){transform:scale(0.99)}
.pay-icon{font-size:22px;flex-shrink:0}
.pay-info{flex:1}
.pay-name{font-size:14px;font-weight:600}
.pay-sub{font-size:11px;color:var(--text3);margin-top:1px}
.pay-amt{font-size:15px;font-weight:700;color:var(--accent);white-space:nowrap}
.pay-radio{width:20px;height:20px;border:2px solid var(--border);border-radius:50%;flex-shrink:0;transition:all .2s}
.pay-row.active .pay-radio{border-color:var(--accent);background:var(--accent);box-shadow:inset 0 0 0 3px var(--surface)}
.cta-wrap{padding:20px 20px 0}
.cta-btn{width:100%;background:var(--accent);color:#000;border:none;border-radius:var(--rs);padding:16px;font-size:16px;font-weight:800;cursor:pointer;transition:transform .15s,background .15s;letter-spacing:.2px}
.cta-btn:active{transform:scale(0.98);background:var(--accent2)}
.cta-btn:disabled{background:var(--surface2);color:var(--text3);pointer-events:none}
</style>
</head>

      "medium": {
        "icon": "🎬",
        "label": "2748 videos available"
      },
      "large": {
        "icon": "🔥",
        "label": "5190+ new files added daily"
      }
    },
    "prices": {
      "small": {
        "stars": 1500,
        "usdt": 15
      },
      "medium": {
        "stars": 2500,
        "usdt": 25
      },
      "large": {
        "stars": 5000,
        "usdt": 50
      }
    }
  }
];
const PAY_METHODS=[
  {key:'stars', icon:'⭐',name:'Telegram Stars',sub:'Мгновенно'},
  {key:'crypto',icon:'💎',name:'USDT (TRC-20)', sub:'По реквизитам'},
  {key:'card',  icon:'💳',name:'Банковская карта',sub:'Скоро',disabled:true},
];
let cur=null,selSize='medium',selMethod='stars';

function renderGrid(){
  const g=document.getElementById('grid');
  g.innerHTML='';
  PRODUCTS.forEach(p=>{
    const d=document.createElement('div');
    d.className='card';
    d.innerHTML=
      (p.isNew?'<div class="new-badge">NEW</div>':'')+
      '<div class="card-header">'+
        '<div class="card-emoji">'+p.emoji+'</div>'+
        '<div class="card-info">'+
          '<div class="card-name">'+p.name+'</div>'+
          '<div class="card-from">от '+p.prices.small.usdt+' USDT</div>'+
        '</div>'+
      '</div>'+
      '<button class="add-btn" onclick="openProduct(\''+p.id+'\',event)">ADD</button>';
    g.appendChild(d);
  });
  document.getElementById('loader').style.display='none';
  g.style.display='grid';
}

function openProduct(id,e){
  e&&e.stopPropagation();
  haptic('light');
  cur=PRODUCTS.find(p=>p.id===id);
  if(!cur)return;
  document.getElementById('s-title').textContent=cur.emoji+' '+cur.name;
  document.getElementById('s-desc').textContent=cur.desc;
  renderSizes();renderMethods();updateCTA();
  document.getElementById('overlay').classList.add('open');
  document.getElementById('sheet').classList.add('open');
}

function closeSheet(){
  document.getElementById('overlay').classList.remove('open');
  document.getElementById('sheet').classList.remove('open');
  haptic('light');
}

function renderSizes(){
  const c=document.getElementById('size-list');
  c.innerHTML='';
  const sizeKeys=[['small','S'],['medium','M'],['large','L']];
  sizeKeys.forEach(([key,lbl])=>{
    const s=cur.sizes[key],p=cur.prices[key],active=key===selSize;
    const d=document.createElement('div');
    d.className='size-row'+(active?' active':'');
    d.onclick=()=>{selSize=key;haptic('light');renderSizes();renderMethods();updateCTA();};
    d.innerHTML=
      '<div class="size-badge">'+lbl+'</div>'+
      '<div class="size-text">'+
        '<div class="size-name">'+s.icon+' '+s.label+'</div>'+
      '</div>'+
      '<div class="size-prices">'+
        '<div class="size-price">⭐'+p.stars+'</div>'+
        '<div class="size-price" style="color:var(--text3);font-weight:400">|</div>'+
        '<div class="size-price">'+p.usdt+'$</div>'+
      '</div>';
    c.appendChild(d);
  });
}

function renderMethods(){
  const c=document.getElementById('pay-methods');
  c.innerHTML='';
  const p=cur.prices[selSize];
  PAY_METHODS.forEach(m=>{
    const active=m.key===selMethod;
    const amt=m.key==='stars'?p.stars+' ⭐':m.key==='crypto'?p.usdt+' USDT':'скоро';
    const d=document.createElement('div');
    d.className='pay-row'+(active?' active':'')+(m.disabled?' dim':'');
    if(!m.disabled)d.onclick=()=>{selMethod=m.key;haptic('light');renderMethods();updateCTA();};
    d.innerHTML=
      '<div class="pay-icon">'+m.icon+'</div>'+
      '<div class="pay-info"><div class="pay-name">'+m.name+'</div><div class="pay-sub">'+m.sub+'</div></div>'+
      '<div class="pay-amt">'+amt+'</div>'+
      '<div class="pay-radio"></div>';
    c.appendChild(d);
  });
}

function updateCTA(){
  const btn=document.getElementById('cta-btn');
  if(!cur)return;
  const p=cur.prices[selSize];
  if(selMethod==='stars'){btn.textContent='Купить за '+p.stars+' ⭐ Stars';btn.disabled=false;}
  else if(selMethod==='crypto'){btn.textContent='Оплатить '+p.usdt+' USDT';btn.disabled=false;}
  else{btn.textContent='💳 Скоро';btn.disabled=true;}
}

function buyNow(){
  if(!cur)return;
  haptic('medium');
  const payload=JSON.stringify({action:selMethod==='stars'?'pay_stars':'pay_crypto',product_id:cur.id,size:selSize});
  // sendData закрывает Mini App автоматически и отправляет данные боту
  if(tg&&tg.sendData){
    try{tg.sendData(payload);return;}catch(e){}
  }
  // Fallback для Menu Button — открываем бота с deep link
  const method=selMethod==='stars'?'stars':'crypto';
  const cmd=method+'__'+cur.id+'__'+selSize;
  if(tg&&tg.openTelegramLink)tg.openTelegramLink('https://t.me/'+BOT_USERNAME+'?start='+cmd);
  else window.open('https://t.me/'+BOT_USERNAME+'?start='+cmd,'_blank');
}

function haptic(t){try{tg?.HapticFeedback?.impactOccurred(t);}catch{}}
renderGrid();
</script>
</body>
</html>
