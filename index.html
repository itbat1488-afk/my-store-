<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>Exclusive Store</title>
<script src="https://telegram.org/js/telegram-web-app.js"></script>
<style>
  @import url('https://fonts.googleapis.com/css2?family=SF+Pro+Display:wght@400;500;600;700&display=swap');

  :root {
    --bg: #0a0a0a;
    --bg2: #141414;
    --bg3: #1c1c1c;
    --surface: #1e1e1e;
    --surface2: #262626;
    --border: rgba(255,255,255,0.08);
    --text: #ffffff;
    --text2: #a0a0a0;
    --text3: #666;
    --accent: #f5a623;
    --accent2: #e09400;
    --green: #30d158;
    --red: #ff453a;
    --radius: 16px;
    --radius-sm: 10px;
    --tg-color-scheme: dark;
  }

  * { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; }

  html, body {
    background: var(--bg);
    color: var(--text);
    font-family: -apple-system, 'SF Pro Display', BlinkMacSystemFont, sans-serif;
    min-height: 100vh;
    overflow-x: hidden;
  }

  /* ─── HEADER ─── */
  .header {
    position: sticky;
    top: 0;
    z-index: 100;
    background: rgba(10,10,10,0.92);
    backdrop-filter: blur(20px);
    -webkit-backdrop-filter: blur(20px);
    border-bottom: 1px solid var(--border);
    padding: 14px 16px 10px;
  }
  .header-title { font-size: 20px; font-weight: 700; letter-spacing: -0.3px; }
  .header-sub { font-size: 12px; color: var(--text3); margin-top: 2px; }

  /* ─── CART BADGE ─── */
  .cart-btn {
    position: fixed;
    bottom: 24px;
    right: 16px;
    z-index: 200;
    background: var(--accent);
    color: #000;
    border: none;
    border-radius: 50px;
    padding: 14px 22px;
    font-size: 15px;
    font-weight: 700;
    display: flex;
    align-items: center;
    gap: 8px;
    box-shadow: 0 8px 30px rgba(245,166,35,0.4);
    cursor: pointer;
    transition: transform 0.15s, box-shadow 0.15s;
    opacity: 0;
    pointer-events: none;
    transform: translateY(80px);
  }
  .cart-btn.visible {
    opacity: 1;
    pointer-events: all;
    transform: translateY(0);
  }
  .cart-btn:active { transform: scale(0.96); }

  /* ─── GRID ─── */
  .grid {
    display: grid;
    grid-template-columns: repeat(3, 1fr);
    gap: 10px;
    padding: 12px;
  }

  /* ─── CARD ─── */
  .card {
    background: var(--surface);
    border-radius: var(--radius);
    overflow: hidden;
    display: flex;
    flex-direction: column;
    align-items: center;
    padding: 14px 8px 10px;
    gap: 8px;
    border: 1px solid var(--border);
    transition: transform 0.15s, border-color 0.15s;
    cursor: pointer;
    position: relative;
  }
  .card:active { transform: scale(0.96); }
  .card.selected { border-color: var(--accent); background: rgba(245,166,35,0.06); }

  .card-emoji {
    font-size: 44px;
    line-height: 1;
    filter: drop-shadow(0 2px 8px rgba(0,0,0,0.3));
  }

  .card-name {
    font-size: 11px;
    font-weight: 600;
    text-align: center;
    color: var(--text2);
    letter-spacing: 0.2px;
  }

  .new-badge {
    position: absolute;
    top: 8px;
    left: 8px;
    background: var(--green);
    color: #000;
    font-size: 9px;
    font-weight: 800;
    padding: 2px 6px;
    border-radius: 6px;
    letter-spacing: 0.5px;
    text-transform: uppercase;
  }

  .add-btn {
    background: var(--accent);
    color: #000;
    border: none;
    border-radius: 8px;
    width: 100%;
    padding: 7px 0;
    font-size: 12px;
    font-weight: 700;
    cursor: pointer;
    transition: background 0.15s, transform 0.1s;
    letter-spacing: 0.3px;
  }
  .add-btn:active { background: var(--accent2); transform: scale(0.97); }
  .add-btn.added {
    background: var(--green);
    color: #fff;
  }

  /* ─── PRODUCT DETAIL SHEET ─── */
  .sheet-overlay {
    position: fixed;
    inset: 0;
    background: rgba(0,0,0,0.7);
    z-index: 300;
    opacity: 0;
    pointer-events: none;
    transition: opacity 0.25s;
  }
  .sheet-overlay.open { opacity: 1; pointer-events: all; }

  .sheet {
    position: fixed;
    bottom: 0;
    left: 0;
    right: 0;
    z-index: 301;
    background: var(--bg2);
    border-radius: 24px 24px 0 0;
    padding: 0 0 40px;
    transform: translateY(100%);
    transition: transform 0.35s cubic-bezier(0.32, 0.72, 0, 1);
    max-height: 85vh;
    overflow-y: auto;
  }
  .sheet.open { transform: translateY(0); }

  .sheet-handle {
    width: 36px; height: 4px;
    background: rgba(255,255,255,0.2);
    border-radius: 2px;
    margin: 12px auto 0;
  }

  .sheet-header {
    display: flex;
    align-items: center;
    gap: 14px;
    padding: 20px 20px 0;
  }
  .sheet-emoji { font-size: 52px; }
  .sheet-info {}
  .sheet-name { font-size: 22px; font-weight: 700; }
  .sheet-desc { font-size: 13px; color: var(--text2); margin-top: 4px; }

  /* ─── SIZE SELECTOR ─── */
  .section-label {
    font-size: 13px;
    font-weight: 600;
    color: var(--text3);
    text-transform: uppercase;
    letter-spacing: 0.8px;
    padding: 20px 20px 10px;
  }

  .size-grid {
    display: grid;
    grid-template-columns: repeat(3, 1fr);
    gap: 10px;
    padding: 0 20px;
  }

  .size-card {
    background: var(--surface);
    border: 2px solid var(--border);
    border-radius: var(--radius-sm);
    padding: 12px 8px;
    text-align: center;
    cursor: pointer;
    transition: all 0.2s;
  }
  .size-card.active {
    border-color: var(--accent);
    background: rgba(245,166,35,0.08);
  }
  .size-card:active { transform: scale(0.96); }

  .size-label {
    font-size: 13px;
    font-weight: 700;
    color: var(--text);
    display: block;
    margin-bottom: 4px;
  }
  .size-sublabel {
    font-size: 10px;
    color: var(--text3);
    display: block;
    margin-bottom: 8px;
  }
  .size-prices { display: flex; flex-direction: column; gap: 3px; }
  .size-price {
    font-size: 11px;
    color: var(--text2);
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 3px;
  }
  .size-price.active-price { color: var(--accent); font-weight: 600; }
  .size-price-val { font-weight: 700; }

  /* ─── PAYMENT ─── */
  .pay-methods {
    display: flex;
    flex-direction: column;
    gap: 10px;
    padding: 0 20px;
  }

  .pay-method {
    background: var(--surface);
    border: 2px solid var(--border);
    border-radius: var(--radius-sm);
    padding: 14px 16px;
    display: flex;
    align-items: center;
    gap: 12px;
    cursor: pointer;
    transition: all 0.2s;
  }
  .pay-method.active {
    border-color: var(--accent);
    background: rgba(245,166,35,0.06);
  }
  .pay-method:active { transform: scale(0.99); }
  .pay-icon { font-size: 24px; }
  .pay-info { flex: 1; }
  .pay-name { font-size: 15px; font-weight: 600; }
  .pay-sub { font-size: 12px; color: var(--text3); margin-top: 1px; }
  .pay-amount { font-size: 16px; font-weight: 700; color: var(--accent); }

  .pay-radio {
    width: 20px; height: 20px;
    border: 2px solid var(--border);
    border-radius: 50%;
    transition: all 0.2s;
    flex-shrink: 0;
  }
  .pay-method.active .pay-radio {
    border-color: var(--accent);
    background: var(--accent);
    box-shadow: inset 0 0 0 3px var(--surface);
  }

  .disabled-method { opacity: 0.4; cursor: not-allowed; }
  .disabled-method:active { transform: none; }

  /* ─── CTA ─── */
  .cta-wrap { padding: 20px 20px 0; }
  .cta-btn {
    width: 100%;
    background: var(--accent);
    color: #000;
    border: none;
    border-radius: var(--radius-sm);
    padding: 16px;
    font-size: 16px;
    font-weight: 800;
    cursor: pointer;
    transition: transform 0.15s, background 0.15s;
    letter-spacing: 0.2px;
  }
  .cta-btn:active { transform: scale(0.98); background: var(--accent2); }
  .cta-btn:disabled { background: var(--surface2); color: var(--text3); pointer-events: none; }

  /* ─── HAPTIC ─── */
  .bounce {
    animation: bounce 0.3s cubic-bezier(0.36, 0.07, 0.19, 0.97);
  }
  @keyframes bounce {
    0%,100% { transform: scale(1); }
    40% { transform: scale(1.12); }
    60% { transform: scale(0.95); }
  }

  /* ─── LOADER ─── */
  .loader {
    display: flex;
    justify-content: center;
    align-items: center;
    height: 200px;
  }
  .spinner {
    width: 36px; height: 36px;
    border: 3px solid var(--border);
    border-top-color: var(--accent);
    border-radius: 50%;
    animation: spin 0.8s linear infinite;
  }
  @keyframes spin { to { transform: rotate(360deg); } }

  /* ─── SCROLLBAR ─── */
  ::-webkit-scrollbar { display: none; }
</style>
</head>
<body>

<div class="header">
  <div class="header-title">🛍 Exclusive Store</div>
  <div class="header-sub">Эксклюзивный контент</div>
</div>

<div id="loader" class="loader"><div class="spinner"></div></div>
<div id="grid-container" class="grid" style="display:none"></div>

<!-- Sheet Overlay -->
<div class="sheet-overlay" id="overlay" onclick="closeSheet()"></div>

<!-- Product Detail Sheet -->
<div class="sheet" id="sheet">
  <div class="sheet-handle"></div>

  <div class="sheet-header">
    <div class="sheet-emoji" id="s-emoji">🔥</div>
    <div class="sheet-info">
      <div class="sheet-name" id="s-name">Alpha Pack</div>
      <div class="sheet-desc" id="s-desc">Описание</div>
    </div>
  </div>

  <div class="section-label">Выберите размер</div>
  <div class="size-grid" id="size-grid"></div>

  <div class="section-label">Способ оплаты</div>
  <div class="pay-methods" id="pay-methods"></div>

  <div class="cta-wrap">
    <button class="cta-btn" id="cta-btn" onclick="buyNow()">Купить</button>
  </div>
</div>

<button class="cart-btn" id="cart-btn" onclick="openSheet()">
  🛒 <span id="cart-label">Открыть корзину</span>
</button>

<script>
  const tg = window.Telegram?.WebApp;
  if (tg) {
    tg.ready();
    tg.expand();
    tg.setHeaderColor('#0a0a0a');
    tg.setBackgroundColor('#0a0a0a');
  }

  // ─── DATA ───────────────────────────────────────────────────────────────────

  const PRODUCTS = [
    {
      id: "pack_alpha",
      name: "Alpha Pack",
      desc: "Эксклюзивная Alpha коллекция",
      emoji: "🔥",
      isNew: true,
      prices: {
        small:  { stars: 50,  usdt: 5.00 },
        medium: { stars: 100, usdt: 10.00 },
        large:  { stars: 200, usdt: 20.00 }
      }
    },
    {
      id: "pack_beta",
      name: "Beta Pack",
      desc: "Премиум Beta выпуск",
      emoji: "💎",
      prices: {
        small:  { stars: 75,  usdt: 7.50 },
        medium: { stars: 150, usdt: 15.00 },
        large:  { stars: 300, usdt: 30.00 }
      }
    },
    {
      id: "pack_gamma",
      name: "Gamma Pack",
      desc: "Лимитированный Gamma серия",
      emoji: "⚡",
      prices: {
        small:  { stars: 100, usdt: 10.00 },
        medium: { stars: 200, usdt: 20.00 },
        large:  { stars: 400, usdt: 40.00 }
      }
    },
    {
      id: "pack_delta",
      name: "Delta Pack",
      desc: "Архивная Delta коллекция",
      emoji: "🎁",
      prices: {
        small:  { stars: 60,  usdt: 6.00 },
        medium: { stars: 120, usdt: 12.00 },
        large:  { stars: 240, usdt: 24.00 }
      }
    },
    {
      id: "pack_sigma",
      name: "Sigma Pack",
      desc: "Ultra Premium Sigma эксклюзив",
      emoji: "👑",
      prices: {
        small:  { stars: 150, usdt: 15.00 },
        medium: { stars: 300, usdt: 30.00 },
        large:  { stars: 600, usdt: 60.00 }
      }
    },
    {
      id: "pack_omega",
      name: "Omega Pack",
      desc: "Финальная Omega коллекция",
      emoji: "🌟",
      prices: {
        small:  { stars: 200, usdt: 20.00 },
        medium: { stars: 400, usdt: 40.00 },
        large:  { stars: 800, usdt: 80.00 }
      }
    },
  ];

  const SIZES = [
    { key: "small",  label: "S",  sub: "Маленький" },
    { key: "medium", label: "M",  sub: "Средний" },
    { key: "large",  label: "L",  sub: "Большой" },
  ];

  const PAY_METHODS = [
    { key: "crypto", icon: "💎", name: "USDT (TRC-20)", sub: "По реквизитам" },
    { key: "card",   icon: "💳", name: "Банковская карта", sub: "Скоро", disabled: true },
  ];

  // ─── STATE ──────────────────────────────────────────────────────────────────

  let currentProduct = null;
  let selectedSize = "medium";
  let selectedMethod = "crypto";

  // ─── RENDER GRID ────────────────────────────────────────────────────────────

  function renderGrid() {
    const container = document.getElementById('grid-container');
    container.innerHTML = '';

    PRODUCTS.forEach(p => {
      const card = document.createElement('div');
      card.className = 'card';
      card.innerHTML = `
        ${p.isNew ? '<div class="new-badge">NEW</div>' : ''}
        <div class="card-emoji">${p.emoji}</div>
        <div class="card-name">${p.name}</div>
        <button class="add-btn" onclick="openProduct('${p.id}', event)">ADD</button>
      `;
      container.appendChild(card);
    });

    document.getElementById('loader').style.display = 'none';
    container.style.display = 'grid';
  }

  // ─── OPEN PRODUCT ───────────────────────────────────────────────────────────

  function openProduct(productId, event) {
    event?.stopPropagation();
    haptic('light');

    currentProduct = PRODUCTS.find(p => p.id === productId);
    if (!currentProduct) return;

    document.getElementById('s-emoji').textContent = currentProduct.emoji;
    document.getElementById('s-name').textContent = currentProduct.name;
    document.getElementById('s-desc').textContent = currentProduct.desc;

    renderSizes();
    renderPayMethods();
    updateCTA();

    document.getElementById('overlay').classList.add('open');
    document.getElementById('sheet').classList.add('open');
  }

  function closeSheet() {
    document.getElementById('overlay').classList.remove('open');
    document.getElementById('sheet').classList.remove('open');
    haptic('light');
  }

  // ─── SIZES ──────────────────────────────────────────────────────────────────

  function renderSizes() {
    const grid = document.getElementById('size-grid');
    grid.innerHTML = '';

    SIZES.forEach(s => {
      const prices = currentProduct.prices[s.key];
      const isActive = s.key === selectedSize;
      const div = document.createElement('div');
      div.className = `size-card ${isActive ? 'active' : ''}`;
      div.onclick = () => selectSize(s.key);
      div.innerHTML = `
        <span class="size-label">${s.label}</span>
        <span class="size-sublabel">${s.sub}</span>
        <div class="size-prices">
          <div class="size-price ${isActive ? 'active-price' : ''}">
            💎 <span class="size-price-val">${prices.usdt} USDT</span>
          </div>
        </div>
      `;
      grid.appendChild(div);
    });
  }

  function selectSize(key) {
    selectedSize = key;
    haptic('light');
    renderSizes();
    renderPayMethods();
    updateCTA();
  }

  // ─── PAY METHODS ────────────────────────────────────────────────────────────

  function renderPayMethods() {
    const container = document.getElementById('pay-methods');
    container.innerHTML = '';
    const prices = currentProduct.prices[selectedSize];

    PAY_METHODS.forEach(m => {
      const isActive = m.key === selectedMethod;
      let amountStr = '';
      if (m.key === 'stars')  amountStr = `${prices.stars} ⭐`;
      if (m.key === 'crypto') amountStr = `${prices.usdt} USDT`;
      if (m.key === 'card')   amountStr = 'скоро';

      const div = document.createElement('div');
      div.className = `pay-method ${isActive ? 'active' : ''} ${m.disabled ? 'disabled-method' : ''}`;
      div.onclick = () => { if (!m.disabled) selectMethod(m.key); };
      div.innerHTML = `
        <div class="pay-icon">${m.icon}</div>
        <div class="pay-info">
          <div class="pay-name">${m.name}</div>
          <div class="pay-sub">${m.sub}</div>
        </div>
        <div class="pay-amount">${amountStr}</div>
        <div class="pay-radio"></div>
      `;
      container.appendChild(div);
    });
  }

  function selectMethod(key) {
    selectedMethod = key;
    haptic('light');
    renderSizes();
    renderPayMethods();
    updateCTA();
  }

  // ─── CTA ────────────────────────────────────────────────────────────────────

  function updateCTA() {
    const btn = document.getElementById('cta-btn');
    if (!currentProduct) return;

    const prices = currentProduct.prices[selectedSize];
    const sizeLabel = SIZES.find(s => s.key === selectedSize)?.sub || '';

    if (selectedMethod === 'crypto') {
      btn.textContent = `Оплатить ${prices.usdt} USDT`;
      btn.disabled = false;
    } else {
      btn.textContent = '💳 Скоро';
      btn.disabled = true;
    }
  }

  // ─── CRYPTO WALLET (замени на свой) ────────────────────────────────────────
  const CRYPTO_WALLET = 'TВашАдресКошелькаUSDT';

  function buyNow() {
    if (!currentProduct) return;
    haptic('medium');

    if (selectedMethod === 'crypto') {
      showCryptoPayment();
    } else {
      showDisabled();
    }
  }

  function showCryptoPayment() {
    const prices = currentProduct.prices[selectedSize];
    const basePrice = prices.usdt;
    // Генерируем уникальную сумму: базовая + случайные центы для идентификации
    // Бот также генерирует свою сумму — они должны совпасть
    // Здесь просто показываем базовую цену, точную уникальную сумму даст бот
    
    // Отправляем данные боту через Telegram.WebApp
    const tgApp = window.Telegram?.WebApp;
    const payload = JSON.stringify({
      action: 'pay_crypto',
      product_id: currentProduct.id,
      size: selectedSize,
      method: 'crypto'
    });

    // Показываем экран оплаты внутри Mini App
    showPayScreen(basePrice);

    // Пробуем отправить боту — сработает только если открыто через кнопку бота
    try {
      if (tgApp?.sendData) tgApp.sendData(payload);
    } catch(e) {}
  }

  function showPayScreen(price) {
    const sizeLabel = SIZES.find(s => s.key === selectedSize)?.sub || '';
    
    // Создаём экран оплаты поверх всего
    const overlay = document.createElement('div');
    overlay.style.cssText = `
      position:fixed;inset:0;background:var(--bg2);z-index:500;
      display:flex;flex-direction:column;padding:24px 20px 40px;
      animation:slideUp 0.3s cubic-bezier(0.32,0.72,0,1);
    `;
    
    overlay.innerHTML = `
      <style>@keyframes slideUp{from{transform:translateY(100%)}to{transform:translateY(0)}}</style>
      <div style="display:flex;align-items:center;gap:12px;margin-bottom:24px">
        <button onclick="this.closest('[data-pay]').remove()" 
          style="background:var(--surface);border:none;color:var(--text);border-radius:50%;width:36px;height:36px;font-size:18px;cursor:pointer">←</button>
        <div style="font-size:18px;font-weight:700">Оплата криптой</div>
      </div>

      <div style="background:var(--surface);border-radius:16px;padding:16px;margin-bottom:16px;border:1px solid var(--border)">
        <div style="font-size:13px;color:var(--text3);margin-bottom:8px">Товар</div>
        <div style="font-size:16px;font-weight:700">${currentProduct.emoji} ${currentProduct.name}</div>
        <div style="font-size:13px;color:var(--text2);margin-top:4px">Размер: ${sizeLabel}</div>
      </div>

      <div style="background:var(--surface);border-radius:16px;padding:16px;margin-bottom:16px;border:1px solid rgba(245,166,35,0.3)">
        <div style="font-size:13px;color:var(--text3);margin-bottom:8px">Сумма к оплате</div>
        <div style="font-size:28px;font-weight:800;color:var(--accent)">${price} USDT</div>
        <div style="font-size:12px;color:var(--text3);margin-top:4px">Точную сумму пришлёт бот в чат</div>
      </div>

      <div style="background:var(--surface);border-radius:16px;padding:16px;margin-bottom:24px;border:1px solid var(--border)">
        <div style="font-size:13px;color:var(--text3);margin-bottom:8px">Кошелёк USDT (TRC-20)</div>
        <div style="font-size:13px;font-weight:600;word-break:break-all;color:var(--text);font-family:monospace">${CRYPTO_WALLET}</div>
        <button onclick="copyWallet()" 
          style="margin-top:10px;background:var(--surface2);border:none;color:var(--accent);border-radius:8px;padding:8px 14px;font-size:13px;font-weight:600;cursor:pointer;width:100%">
          📋 Скопировать адрес
        </button>
      </div>

      <div style="background:rgba(245,166,35,0.08);border:1px solid rgba(245,166,35,0.2);border-radius:12px;padding:14px;margin-bottom:24px">
        <div style="font-size:13px;color:var(--accent);font-weight:600;margin-bottom:6px">⚠️ Важно</div>
        <div style="font-size:12px;color:var(--text2);line-height:1.5">
          Закройте это окно — бот пришлёт точную сумму с уникальными центами для идентификации вашего платежа. Переводите ТОЧНУЮ сумму которую укажет бот.
        </div>
      </div>

      <button onclick="closeAndConfirm()" 
        style="background:var(--accent);color:#000;border:none;border-radius:10px;padding:16px;font-size:16px;font-weight:800;cursor:pointer;width:100%">
        ✅ Понятно, закрыть
      </button>
    `;
    overlay.setAttribute('data-pay', '1');
    document.body.appendChild(overlay);
  }

  function copyWallet() {
    navigator.clipboard.writeText(CRYPTO_WALLET).then(() => {
      haptic('light');
      const btn = document.querySelector('[data-pay] button:nth-last-of-type(2)');
      if (btn) { btn.textContent = '✅ Скопировано!'; setTimeout(() => btn.textContent = '📋 Скопировать адрес', 2000); }
    });
  }

  function closeAndConfirm() {
    haptic('medium');
    // Отправляем данные боту и закрываем
    const tgApp = window.Telegram?.WebApp;
    const payload = JSON.stringify({
      action: 'pay_crypto',
      product_id: currentProduct.id,
      size: selectedSize,
      method: 'crypto'
    });
    try {
      if (tgApp?.sendData) {
        tgApp.sendData(payload);
      } else {
        // Если sendData не работает (Menu Button) — просто закрываем
        if (tgApp?.close) tgApp.close();
        else document.querySelector('[data-pay]')?.remove();
      }
    } catch(e) {
      if (tgApp?.close) tgApp.close();
    }
  }

  function showDisabled() {
    haptic('light');
  }

  // ─── HAPTIC ─────────────────────────────────────────────────────────────────

  function haptic(type = 'light') {
    try { tg?.HapticFeedback?.impactOccurred(type); } catch {}
  }

  // ─── INIT ───────────────────────────────────────────────────────────────────

  setTimeout(renderGrid, 300);
</script>
</body>
</html>
